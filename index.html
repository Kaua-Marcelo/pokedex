<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
</head>

<body>
  <header id="header-bar">
    <div class="header-left">
      <a href="index.html">
        <img src="assets/PokeBall.png" alt="pokébola" width="70px" />
      </a>
      <a href="" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i></a>
    </div>
    <h1 class="header-title">POKEDEX</h1>
    <button class="btn-menu"><i class="fa-solid fa-bars"></i></button>
  </header>

  <div class="busca-poke">
    <input type="text" id="input-busca" placeholder="Enter a name or id">
  </div>


  <div class="sort-id">
    <label for="select-sort">Sort by:</label>
    <select id="select-sort">
      <option value="id-asc">ID (Ascending)</option>
      <option value="id-desc">ID (Decreasing)</option>
      <option value="nome-az">Name (A-Z)</option>
      <option value="nome-za">Name (Z-A)</option>
    </select>

  </div>
  <div class="tipo-poke">
    <label for="filtro-tipo">Type:</label>

    <select id="filtro-tipo">
      <option value="all">ALL</option>
      <option value="fire">Fire</option>
      <option value="water">Water</option>
      <option value="grass">Grass</option>
      <option value="poison">Poison</option>
      <option value="fighting">Fighting</option>
      <option value="ground">Ground</option>
      <option value="normal">Normal</option>
      <option value="psychic">Psychic</option>
      <option value="bug">Bug</option>
      <option value="electric">Electric</option>
      <option value="fairy">Fairy</option>
      <option value="rock">Rock</option>
      <option value="ghost">Ghost</option>
      <option value="ice">Ice</option>
      <option value="dragon">Dragon</option>
    </select>
  </div>

  <div id="principal">

  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="favorito.js"></script>
  <script src="card-motion.js"></script>
  
</body>

</html>
