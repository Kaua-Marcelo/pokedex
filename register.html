<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"/>
  </head>
  <body class="login">

    <header id="header-bar">
      <div class="header-left">
        <a href="index.html">
          <img src="assets/PokeBall.png" alt="pokébola" width="70px" />
        </a>
        <button class="btn-voltar"><i class="fa-solid fa-arrow-left"></i></button>
      </div>
      <h1 class="header-title">POKEDEX</h1>
      <button class="btn-menu"><i class="fa-solid fa-bars"></i></button>
    </header>
    
    <main>
      <section id="register">  
        <h2>Create Account</h2>
        <p class="login-account">Already have an account?<a href="login.html" class="login-acc"> Sign in</a></p>
        <div class="form-register">
            <input type="text" placeholder="Enter a username">
            <p class="erro"></p> 
            <input type="password" placeholder="Enter your password">
            <p class="erro"></p> 
            <input type="password" placeholder="Confirm your password">
            <p class="erro"></p> 
            <button>Create Account</button>
        </div>
      </section>
    </main>

    <div id="tela-inicial" class="overlay-selecao">
      <div class="conteudo-selecao">
        <h2 class="titulo-escolha">ESCOLHA SEU PRIMEIRO POKÉMON</h2>
        <div id="container-iniciais" class="cards-iniciais">
            </div>
      </div>
    </div>

    <div id="mensagem-sucesso" class="mensagem-sucesso">
    <p id="texto-mensagem"></p>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script src="card-motion.js"></script>

  <script src="register.js"></script>
</body>
</html>
