<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"/>
  </head>
  <body class="login">

    <header id="header-bar">
      <div class="header-left">
        <a href="index.html">
          <img src="assets/PokeBall.png" alt="pokébola" width="70px" />
        </a>
        <a href="" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i></a>
      </div>
      <h1 class="header-title">POKEDEX</h1>
      <button class="btn-menu"><i class="fa-solid fa-bars"></i></button>
    </header>
    
    <main>
      <section id="login">  
        <h2>Sign In</h2>
        <p class="create-account">Don’t have an account ? <a href="register.html" class="create">Create now!</a></p>
        
        <div class="form-login">
            <input type="text" placeholder="Enter your username">
            <p class="erro"></p> 
            <input type="password" placeholder="Enter your password">
            <p class="erro"></p> 
            <button>Continue</button>
        </div>
      </section>
    </main>
    <script src="login.js"></script>
</body>
</html>
