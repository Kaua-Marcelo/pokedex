<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Favorites</title>
    <link rel="icon" type="image/png" href="assets/PokeBall.png"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"/>
    <link rel="stylesheet" href="css/sidebar.css"/>
  </head>

  <body class="fav">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/PokeBall.png" alt="Pokéball" width="40"/>
        <h3>POKEDEX</h3>
      </div>

      <div class="sidebar-user-info">
        <p class="user-name" id="userNameDisplay"></p>
        <button class="btn-logout" id="btnLogout">
          <i class="bi bi-box-arrow-right"></i> Quit
        </button>
      </div>

      <ul class="sidebar-menu">
        <li>
          <a href="index.html" class="nav-link active" data-page="pokedex">
            <i class="bi bi-house"></i> Home
          </a>
        </li>
        <li>
          <a href="fav.html" class="nav-link" data-page="favoritos">
            <i class="bi bi-star-fill"></i> Favorites
          </a>
        </li>
        <li>
          <a href="overview.html" class="nav-link" data-page="sobre">
            <i class="bi bi-exclamation-circle"></i> About
          </a>
        </li>
      </ul>
    </div>

    <header id="header-bar">
      <div class="header-left">
        <a href="index.html">
          <img src="assets/PokeBall.png" alt="pokébola" width="70px" />
        </a>
        <button class="btn-voltar">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
      </div>
      <h1 class="header-title"><a href="index.html">POKEDEX</a></h1>
      <button class="btn-menu" id="sidebarToggle">
        <i class="fa-solid fa-bars"></i>
      </button>
    </header>
    <h2>My Favorites</h2>
    <div class="busca-poke">
      <input type="text" id="input-busca" placeholder="Enter a name or id" />
    </div>

    <div class="sort-id">
      <label for="select-sort-fav">Sort by: </label>
      <select id="select-sort-fav">
        <option value="id-asc">ID (Ascending)</option>
        <option value="id-desc">ID (Decreasing)</option>
        <option value="nome-az">Name (A-Z)</option>
        <option value="nome-za">Name (Z-A)</option>
      </select>
    </div>
    <div class="tipo-poke">
      <label for="filtro-tipo-fav">Type:</label>

      <select id="filtro-tipo-fav">
        <option value="all">ALL</option>
        <option value="fire">Fire</option>
        <option value="water">Water</option>
        <option value="grass">Grass</option>
        <option value="poison">Poison</option>
        <option value="fighting">Fighting</option>
        <option value="ground">Ground</option>
        <option value="normal">Normal</option>
        <option value="psychic">Psychic</option>
        <option value="bug">Bug</option>
        <option value="electric">Electric</option>
        <option value="fairy">Fairy</option>
        <option value="rock">Rock</option>
        <option value="ghost">Ghost</option>
        <option value="ice">Ice</option>
        <option value="dragon">Dragon</option>
        <option value="flying">Flying</option>
        <option value="dark">Dark</option>
        <option value="steel">Steel</option>
      </select>
    </div>

    <div id="favoritos"></div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <script src="js/components/sidebar.js"></script>
    <script type="module" src="js/pages/favorito.js"></script>
  </body>
</html>
