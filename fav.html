<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"/>
</head>
<body class="fav">
    <header id="header-bar">
      <div class="header-left">
        <a href="index.html">
          <img src="assets/PokeBall.png" alt="pokébola" width="70px" />
        </a>
        <a href="" class="btn-voltar"><i class="fa-solid fa-arrow-left"></i></a>
      </div>
      <h1 class="header-title"><a href="index.html">POKEDEX</a></h1>
      <button class="btn-menu"><i class="fa-solid fa-bars"></i></button>
    </header>
        <h2>My Favorites</h2>
        <div class="busca-poke">
          <p>Enter a name or id</p>
          <div class="lupa">⌕</div>
        </div>
        

        <div class="sort-id">
          <label>Sort by:  </label>
          <select>
            
            <option>ID (Ascending)</option>
            <option>ID (Decreasing)</option>
            <option>Name (A-Z)</option>
            <option>Name (Z-A)</option>
            <option>Weakness (A-Z)</option>
            <option>Weakness (Z-A)</option>
            <option>Category (A-Z)</option>
            <option>Category (Z-A)</option>
            <option>Type (A-Z)</option>
            <option>Type (Z-A)</option>


          </select>

        </div>
        <div class="tipo-poke">
          <label>Type:</label>
          
          <select>
           <option>ALL</option>
           <option class="teste">Fire</option>
           <option>Water</option>
           <option>Grass</option>

          </select>

        </div>

        
        <div id="favoritos">
          <div class="card">
            <p1 class="Nome-principal">Charmander</p1>
            <p>id 001</p>
            <img src="assets/Charmander.png" alt="charmander">
            <p>Fire</p>
            <div class="estrela">★</div>
          </div>
        
          <div class="card">
            <p1 class="Nome-principal">Squirtle</p1>
            <p>id 002</p>
            <img src="assets/Squirtle-PNG-Image-File.png" alt="Squirtle" >
            <p>Water</p>
            <div class="estrela">★</div>
          </div>

          <div class="card">
            <p1 class="Nome-principal"><strong>Mewtwo</strong></p1>
            <p>id 003</p>
            <img src="assets/Mewtwo.png" alt="Squirtle" >
            <p>Psychic</p>
            <div class="estrela">★</div>
          </div>

          <div class="card">
            <p1 class="Nome-principal"  >Snorlax</p1>
            <p>id 004</p>
            <img src="assets/Snorlax.png" alt="Squirtle" >
            <p class="Normal">Normal</p>
            <div class="estrela">★</div>
          </div>
            
          <div class="card">
            <p1 class="Nome-principal">Pikachu</p1>
            <p>id 005</p>
            <img src="assets/Pikachu.png" alt="Squirtle" >
            <p class="Eletric">Eletric</p>
            <div class="estrela">★</div>
          </div>

          
          <div class="card">
            <p1 class="Nome-principal">Jolteon</p1>
            <p>id 006</p>
            <img src="assets/Jolteon.png" alt="charmander">
            <p class="Eletric">Eletric</p>
            <div class="estrela">★</div>
          </div>

          <div class="card">
            <p1 class="Nome-principal">Growlithe</p1>
            <p>id 007</p>
            <img src="assets/Growlithe.png" alt="charmander">
            <p class="Fire">Fire</p>
            <div class="estrela">★</div>
          </div>


        </div>


  <script src="script.js"></script>

  <script src="card-motion.js"></script>
</body>
</html>
